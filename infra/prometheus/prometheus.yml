global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'eolas-api'
    metrics_path: '/actuator/prometheus'
    static_configs:
      # When running inside Docker Compose network:
      - targets: ['kosha-api:8080']
      # When scraping a backend running outside Docker (dev):
      # - targets: ['host.docker.internal:8081']
