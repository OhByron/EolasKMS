spring:
  application:
    name: kosha-api

  datasource:
    url: jdbc:postgresql://localhost:5432/kosha
    username: kosha
    password: ${KOSHA_DB_PASSWORD:kosha}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_schema: public

  flyway:
    enabled: true
    locations: classpath:db/migration
    default-schema: public

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8180/realms/kosha}

  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:1025}
    properties:
      mail.smtp.auth: false
      mail.smtp.starttls.enable: false

  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
  metrics:
    tags:
      application: ${spring.application.name}
  prometheus:
    metrics:
      export:
        enabled: true

kosha:
  storage:
    minio:
      endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
      access-key: ${MINIO_ACCESS_KEY:minioadmin}
      secret-key: ${MINIO_SECRET_KEY:minioadmin}
      bucket: ${MINIO_BUCKET:kosha-vault}
  nats:
    url: ${NATS_URL:nats://localhost:4222}
  opensearch:
    url: ${OPENSEARCH_URL:https://localhost:9200}
  keycloak:
    # Base URL Keycloak is running at (no /realms suffix).
    server-url: ${KEYCLOAK_SERVER_URL:http://localhost:8180}
    # The realm Kosha users live in.
    realm: ${KEYCLOAK_REALM:kosha}
    # Service account client used by the backend to manage users.
    admin-client-id: ${KEYCLOAK_ADMIN_CLIENT_ID:kosha-backend}
    admin-client-secret: ${KEYCLOAK_ADMIN_CLIENT_SECRET:kosha-backend-dev-secret}
    # Master realm admin credentials — used ONLY by the bootstrap step to
    # grant realm-admin role to the service account if it's not already set up.
    # Safe to omit in production after first boot.
    master-username: ${KEYCLOAK_MASTER_USERNAME:admin}
    master-password: ${KEYCLOAK_MASTER_PASSWORD:admin}
