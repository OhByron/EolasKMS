spring:
  application:
    name: kosha-api

  datasource:
    url: jdbc:postgresql://localhost:5432/kosha
    username: kosha
    password: ${KOSHA_DB_PASSWORD:kosha}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_schema: public

  flyway:
    enabled: true
    locations: classpath:db/migration
    schemas:
      - ident
      - doc
      - wf
      - tax
      - storage
      - ret
      - notif
      - audit
      - report

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8180/realms/kosha}

  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:1025}

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

kosha:
  storage:
    minio:
      endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
      access-key: ${MINIO_ACCESS_KEY:minioadmin}
      secret-key: ${MINIO_SECRET_KEY:minioadmin}
      bucket: ${MINIO_BUCKET:kosha-vault}
  nats:
    url: ${NATS_URL:nats://localhost:4222}
  opensearch:
    url: ${OPENSEARCH_URL:https://localhost:9200}
