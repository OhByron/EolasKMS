name: CI

on:
  push:
    branches: [master, main]
  pull_request:

# Avoid stacking parallel runs from rapid pushes — keep only the latest per ref.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  jvm:
    name: Kotlin (gradle check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle (with cache)
        uses: gradle/actions/setup-gradle@v4

      - name: Build & test
        run: ./gradlew check --no-daemon --stacktrace

  web:
    name: kosha-web (svelte-check)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: kosha-web
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: kosha-web/package-lock.json

      - name: Install dependencies
        run: npm ci

      # Paraglide-generated files (src/paraglide/) are gitignored — they're
      # produced by the @inlang/paraglide-sveltekit vite plugin during
      # `vite dev` / `vite build`. `svelte-kit sync` alone doesn't trigger
      # the vite plugin, so we compile them explicitly here before
      # svelte-check runs and resolves `$paraglide/messages`.
      - name: Generate paraglide messages
        run: npx --yes @inlang/paraglide-js@latest compile --project ./project.inlang --outdir ./src/paraglide

      - name: Type-check
        run: npm run check

  ai-sidecar:
    name: kosha-ai-sidecar (ruff)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: kosha-ai-sidecar
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dev deps
        run: pip install '.[dev]'

      - name: Lint
        run: ruff check .

      # Tests do not exist yet. When they're added, replace this block with:
      #   - name: Test
      #     run: pytest -q

  compose-smoke:
    # Boots the full compose stack and confirms each host-exposed service is
    # reachable. Catches wiring drift between code and infra — env-var mismatches,
    # missing depends_on, port-mapping mistakes — that unit tests won't.
    #
    # Runs after jvm and ai-sidecar so we don't waste 5+ minutes on a stack boot
    # if the basic compile/lint already failed. Skipping the web job dependency
    # because it's expected red on pre-existing svelte-check errors and the
    # backend stack doesn't need a built frontend to start.
    name: Compose stack smoke test
    runs-on: ubuntu-latest
    needs: [jvm, ai-sidecar]
    steps:
      - uses: actions/checkout@v4

      - name: Boot the stack (waits on healthchecks)
        run: docker compose up -d --wait --wait-timeout 300

      - name: Probe host-exposed service endpoints
        shell: bash
        run: |
          set -e
          probe_http() {
            local name=$1
            local url=$2
            echo "→ $name @ $url"
            curl -fsS --max-time 30 "$url" > /dev/null
            echo "  ✓ ok"
          }

          probe_http kosha-api   http://localhost:8080/actuator/health
          probe_http nats        http://localhost:8222/healthz
          probe_http minio       http://localhost:9000/minio/health/live
          probe_http opensearch  http://localhost:9200/_cluster/health
          probe_http mailpit     http://localhost:8025/api/v1/info

          # Keycloak's compose healthcheck is TCP-only (echo > /dev/tcp/...);
          # match it here. Hitting / over HTTP would 302/200 depending on the
          # admin theme and isn't a stable check.
          echo "→ keycloak @ localhost:8180 (TCP)"
          nc -z -w 30 localhost 8180
          echo "  ✓ ok"

          # kosha-ai has no host-exposed port; confirm it reached steady state
          # by looking for the "listening for tasks" log line that main.py emits
          # once NATS subscription is set up.
          echo "→ kosha-ai (log probe)"
          if docker compose logs kosha-ai 2>&1 | grep -q "listening for tasks"; then
            echo "  ✓ ok"
          else
            echo "  ✗ kosha-ai never logged 'listening for tasks'"
            exit 1
          fi

      - name: Dump logs on failure
        if: failure()
        run: docker compose logs --tail=200

      - name: Tear down
        if: always()
        run: docker compose down -v
