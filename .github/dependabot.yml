# Dependabot configuration for EolasKMS.
#
# Covers the four ecosystems present in the repo:
#   - Gradle (Kotlin/JVM backend, multi-module)
#   - npm    (kosha-web SvelteKit frontend)
#   - pip    (kosha-ai-sidecar Python services)
#   - docker (base image bumps in all four Dockerfiles)
#
# The kosha-preview-sidecar's pip dependencies are pinned inline in its
# Dockerfile (no requirements.txt / pyproject.toml), so they're tracked
# transitively via the docker ecosystem and the base-image bump rather
# than directly by pip.
#
# Schedule: monthly, first Monday morning UTC. Lower noise floor than
# weekly while still catching CVEs within a sane window — Dependabot's
# always-on security alerts handle anything urgent in between.
#
# Grouping keeps PR volume sane — Kotlin and Spring move as ecosystems,
# so per-artefact PRs are noise. Major bumps stay un-grouped because
# they almost always require manual code changes.

version: 2
updates:
  # ── Gradle ──────────────────────────────────────────────────────────
  # Multi-project Gradle requires one directory entry per build file.
  # The `directories:` plural form lets a single block cover them all
  # while still applying the same grouping/limits everywhere.
  #
  # The root build.gradle.kts intentionally has no direct `implementation`
  # declarations — it only configures plugins for `subprojects { … }`.
  # Listing "/" here causes Dependabot to resolve the subproject
  # classpath through the root and open a second PR for every module
  # dep. Module entries below are sufficient.
  - package-ecosystem: "gradle"
    directories:
      - "/kosha-app"
      - "/kosha-audit"
      - "/kosha-common"
      - "/kosha-document"
      - "/kosha-identity"
      - "/kosha-import"
      - "/kosha-notification"
      - "/kosha-reporting"
      - "/kosha-retention"
      - "/kosha-search"
      - "/kosha-storage"
      - "/kosha-taxonomy"
      - "/kosha-workflow"
    schedule:
      interval: "monthly"
      day: "monday"
      time: "06:00"
      timezone: "Etc/UTC"
    open-pull-requests-limit: 8
    reviewers:
      - "byronjbignell"
    assignees:
      - "byronjbignell"
    labels:
      - "dependencies"
      - "backend"
    commit-message:
      prefix: "deps"
      include: "scope"
    groups:
      kotlin:
        patterns:
          - "org.jetbrains.kotlin*"
          - "org.jetbrains.kotlinx*"
      spring:
        patterns:
          - "org.springframework*"
          - "io.spring*"
        # Spring Boot majors usually require a coordinated upgrade
        # across all modules — keep majors as a separate PR per artefact.
        update-types:
          - "minor"
          - "patch"
      testing:
        patterns:
          - "org.junit*"
          - "io.mockk*"
          - "org.testcontainers*"
          - "org.assertj*"
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"
    ignore:
      # opensearch-rest-high-level-client is deprecated upstream and
      # superseded by org.opensearch.client:opensearch-java. Skip its
      # major bumps (which are just security-patched zombies of the old
      # API) until OpenSearchService.kt is ported to the new client.
      # Lift this rule once that migration lands.
      - dependency-name: "org.opensearch.client:opensearch-rest-high-level-client"
        update-types: ["version-update:semver-major"]
      # Gradle 9 needs KGP 2.2.x+, which in turn needs Spring Boot 3.5+
      # (SB 3.4 ships kotlin-build-tools-impl 2.1.x and the Build Tools
      # API classpath conflicts with KGP >= 2.2). Verified locally:
      # Gradle 9.4.1 + KGP 2.1.21 fails ClasspathEntrySnapshotTransform
      # on every Spring jar, and bumping KGP to 2.3.x doesn't help
      # because the SB plugin still pins the older build-tools-impl.
      # Lift this rule as part of the next Spring Boot upgrade.
      - dependency-name: "gradle"
        update-types: ["version-update:semver-major"]
      # KGP 2.1.21 on Gradle 8.12 fails its own classpath snapshot
      # transform with NoClassDefFoundError on
      # org/jetbrains/kotlin/incremental/classpathDiff/ClasspathEntrySnapshotter$Settings
      # — verified locally on a clean build cache. The 2.1.20→2.1.21
      # bump was originally taken to enable Gradle 9 (now reverted), so
      # the justification no longer holds. Pin to 2.1.10 until the
      # coordinated KGP/Gradle/Spring Boot upgrade and lift alongside
      # the gradle-major rule above.
      - dependency-name: "org.jetbrains.kotlin:*"
        versions: [">2.1.10"]

  # ── npm (SvelteKit frontend) ────────────────────────────────────────
  - package-ecosystem: "npm"
    directory: "/kosha-web"
    schedule:
      interval: "monthly"
      day: "monday"
      time: "06:00"
      timezone: "Etc/UTC"
    open-pull-requests-limit: 8
    reviewers:
      - "byronjbignell"
    assignees:
      - "byronjbignell"
    labels:
      - "dependencies"
      - "frontend"
    commit-message:
      prefix: "deps(web)"
    groups:
      svelte:
        patterns:
          - "svelte"
          - "@sveltejs/*"
          - "svelte-*"
      tailwind:
        patterns:
          - "tailwindcss"
          - "@tailwindcss/*"
      types:
        patterns:
          - "@types/*"
        update-types:
          - "minor"
          - "patch"
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"
    ignore:
      # TypeScript 6.x is too fresh — the SvelteKit + svelte-check type
      # surface lags new majors. Defer until the ecosystem catches up.
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]

  # ── pip (AI sidecar) ────────────────────────────────────────────────
  - package-ecosystem: "pip"
    directory: "/kosha-ai-sidecar"
    schedule:
      interval: "monthly"
      day: "monday"
      time: "06:00"
      timezone: "Etc/UTC"
    open-pull-requests-limit: 5
    reviewers:
      - "byronjbignell"
    assignees:
      - "byronjbignell"
    labels:
      - "dependencies"
      - "ai-sidecar"
    commit-message:
      prefix: "deps(ai)"
    groups:
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"

  # ── Docker base images ──────────────────────────────────────────────
  # One entry per Dockerfile directory. Kept ungrouped because each
  # service has independent base-image risk (Temurin JDK vs Node vs
  # Debian) and a coordinated bump rarely makes sense.
  - package-ecosystem: "docker"
    directories:
      - "/kosha-app"
      - "/kosha-web"
      - "/kosha-ai-sidecar"
      - "/kosha-preview-sidecar"
    schedule:
      interval: "monthly"
      day: "monday"
      time: "06:00"
      timezone: "Etc/UTC"
    open-pull-requests-limit: 4
    reviewers:
      - "byronjbignell"
    assignees:
      - "byronjbignell"
    labels:
      - "dependencies"
      - "docker"
    commit-message:
      prefix: "deps(docker)"
    ignore:
      # Node odd-numbered majors are not LTS — skip them entirely.
      # Even-numbered LTS majors (24, 26, …) still come through.
      - dependency-name: "node"
        versions: ["23.x", "25.x", "27.x", "29.x"]
      # Python 3.14 wheels for spaCy / ocrmypdf still lag (Apr 2026).
      # Lift once `python -m spacy download en_core_web_sm` works
      # cleanly on 3.14 in the kosha-ai-sidecar build.
      - dependency-name: "python"
        versions: ["3.14", "3.14.x"]
      # Temurin 25 LTS needs Spring Boot 3.5+ for official support;
      # current SB is 3.4.4. Lift when SB is bumped.
      - dependency-name: "eclipse-temurin"
        versions: ["25", "25.x"]
