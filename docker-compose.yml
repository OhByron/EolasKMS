services:
  # ── Application Services ─────────────────────────────────────
  kosha-api:
    build:
      context: .
      dockerfile: kosha-app/Dockerfile
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
      opensearch:
        condition: service_healthy
      minio:
        condition: service_healthy
      keycloak:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      nats-init:
        condition: service_completed_successfully
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/kosha
      SPRING_DATASOURCE_USERNAME: kosha
      SPRING_DATASOURCE_PASSWORD: kosha
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI: http://localhost:8180/realms/kosha
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI: http://keycloak:8080/realms/kosha/protocol/openid-connect/certs
      # Health-indicator probe URL. Must be reachable from inside the
      # kosha-api container, so use the internal docker hostname rather
      # than the public `localhost:8180` that browsers use.
      KEYCLOAK_SERVER_URL: http://keycloak:8080
      KOSHA_NATS_URL: nats://nats:4222
      KOSHA_OPENSEARCH_URL: http://opensearch:9200
      KOSHA_STORAGE_MINIO_ENDPOINT: http://minio:9000
      KOSHA_STORAGE_MINIO_ACCESS_KEY: minioadmin
      KOSHA_STORAGE_MINIO_SECRET_KEY: minioadmin
      SPRING_MAIL_HOST: mailpit
      SPRING_MAIL_PORT: 1025
      # Pass 4.1 optional preview sidecar. Unset (or blank) = disabled,
      # in which case Office previews degrade to download buttons.
      # Docker Compose interpolates ${KOSHA_PREVIEW_SIDECAR_URL:-} from
      # the host env, allowing the `office-preview` profile to set it.
      KOSHA_PREVIEW_SIDECAR_URL: ${KOSHA_PREVIEW_SIDECAR_URL:-}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  kosha-ai:
    build:
      context: ./kosha-ai-sidecar
    depends_on:
      nats:
        condition: service_healthy
      nats-init:
        condition: service_completed_successfully
    environment:
      KOSHA_AI_NATS_URL: nats://nats:4222
      KOSHA_AI_KOSHA_API_URL: http://kosha-api:8080
      KOSHA_AI_LLM_PROVIDER: ollama
      KOSHA_AI_LLM_ENDPOINT: http://ollama:11434
      KOSHA_AI_MINIO_ENDPOINT: minio:9000
      KOSHA_AI_MINIO_ACCESS_KEY: minioadmin
      KOSHA_AI_MINIO_SECRET_KEY: minioadmin
    deploy:
      resources:
        limits:
          memory: 4G
    restart: unless-stopped

  # ── Optional: Office document preview sidecar ────────────────
  # Opt-in via `docker compose --profile office-preview up`. Without
  # this service running, Office documents fall back to a "Download
  # original" button in the frontend — PDF, image, and text preview
  # still work because they use client-side rendering. See Pass 4.1
  # roadmap note for why this is split out (500MB LibreOffice base
  # image is too much to require for every deployment).
  # Note: setting KOSHA_PREVIEW_SIDECAR_URL to http://kosha-preview:9100
  # in the host environment (e.g. via .env) is what actually activates
  # the conversion path on the backend — the `--profile office-preview`
  # flag only starts the sidecar container. Both are required.
  kosha-preview:
    build:
      context: ./kosha-preview-sidecar
    profiles: ["office-preview"]
    environment:
      EOLAS_PREVIEW_LOG_LEVEL: INFO
    # Security hardening: read-only root FS, non-root user (in image),
    # tmpfs for /tmp (LibreOffice's user profile + conversion workdirs
    # live here). Keeps the blast radius of a LibreOffice CVE minimal.
    read_only: true
    tmpfs:
      - /tmp:rw,size=256m
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.5"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9100/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # ── Infrastructure ───────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: kosha
      POSTGRES_USER: kosha
      POSTGRES_PASSWORD: kosha
    volumes:
      - pg-data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kosha"]
      interval: 5s
      timeout: 3s
      retries: 5

  opensearch:
    image: opensearchproject/opensearch:2.12.0
    ports:
      - "9200:9200"
    environment:
      discovery.type: single-node
      OPENSEARCH_JAVA_OPTS: "-Xms512m -Xmx512m"
      DISABLE_SECURITY_PLUGIN: "true"
    volumes:
      - os-data:/usr/share/opensearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD-SHELL", "mc ready local || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s

  nats:
    image: nats:2.10-alpine
    command: ["--jetstream", "--store_dir=/data", "--http_port=8222"]
    ports:
      - "4222:4222"
      - "8222:8222"
    volumes:
      - nats-data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8222/healthz || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    command: start-dev --import-realm
    ports:
      - "8180:8080"
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_HEALTH_ENABLED: "true"
    volumes:
      - ./infra/keycloak/kosha-realm.json:/opt/keycloak/data/import/kosha-realm.json
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "echo > /dev/tcp/localhost/8080"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web UI
    environment:
      MP_SMTP_AUTH_ACCEPT_ANY: "true"
      MP_SMTP_AUTH_ALLOW_INSECURE: "true"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8025/api/v1/info || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Init Containers ──────────────────────────────────────────
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: /bin/sh
    command:
      - -c
      - |
        mc alias set kosha http://minio:9000 minioadmin minioadmin
        mc mb --ignore-existing kosha/kosha-vault
        mc mb --ignore-existing kosha/kosha-vault-connector
        mc anonymous set download kosha/kosha-vault || true
        echo "MinIO buckets initialized"
    restart: "no"

  nats-init:
    image: natsio/nats-box:latest
    depends_on:
      nats:
        condition: service_healthy
    entrypoint: /bin/sh
    command:
      - -c
      - |
        nats -s nats://nats:4222 stream add KOSHA_EVENTS \
          --subjects="doc.>,wf.>,tax.>,retention.>,ident.>,storage.>" \
          --storage=file --replicas=1 --retention=limits \
          --max-age=90d --max-bytes=1073741824 \
          --discard=old --dupe-window=2m --no-allow-rollup \
          --defaults 2>/dev/null || echo "KOSHA_EVENTS stream exists"

        nats -s nats://nats:4222 stream add KOSHA_AI \
          --subjects="ai.>" \
          --storage=file --replicas=1 --retention=work \
          --max-age=7d --max-bytes=536870912 \
          --discard=old --dupe-window=2m --no-allow-rollup \
          --defaults 2>/dev/null || echo "KOSHA_AI stream exists"

        echo "NATS JetStream streams initialized"
    restart: "no"

  # ── Optional: Local AI model server ──────────────────────────
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    profiles:
      - local-ai

volumes:
  pg-data:
  os-data:
  minio-data:
  nats-data:
  ollama-data:
